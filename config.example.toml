# any-converter example configuration
#
# Run with: any-converter serve --config config.example.toml

[server]
host = "127.0.0.1"
port = 8080
# Optional client API key — clients must send `Authorization: Bearer <api_key>`
# api_key = "sk-client-key"

# ── Provider Definitions ─────────────────────────────────────────────
# Each provider is an upstream LLM endpoint with its own API key and format.

[[providers]]
name = "openai"
format = "openai_chat"
base_url = "https://api.openai.com"
api_key = "sk-proj-your-openai-key"

[[providers]]
name = "anthropic"
format = "claude"
base_url = "https://api.anthropic.com"
api_key = "sk-ant-your-anthropic-key"
# Model map supports wildcard patterns; longest match wins
# model_map = { "claude-opus-*" = "claude-opus-4-20250514", "claude-*" = "claude-sonnet-4-20250514" }

[[providers]]
name = "deepseek"
format = "openai_chat"
base_url = "https://api.deepseek.com"
api_key = "sk-your-deepseek-key"

# Optional provider transport overrides for OpenAI-compatible providers
# whose paths or auth headers differ from the default format conventions.
# [providers.endpoints]
# path = "/v1/chat/completions"
# stream_path = "/v1/chat/completions"
#
# [providers.auth]
# scheme = "bearer"  # bearer, api_key_header, x_api_key, google_api_key, anthropic, none
# headers = { "x-custom-header" = "value" }

[[providers]]
name = "gemini"
format = "gemini"
base_url = "https://generativelanguage.googleapis.com"
api_key = "AIza-your-gemini-key"

# ── Model Routes (recommended) ──────────────────────────────────────
# Route requests to providers based on model name (glob patterns).
# First match wins. Supports failover via multiple providers.

[[model_routes]]
pattern = "claude-*"
provider = "anthropic"

[[model_routes]]
pattern = "gpt-*"
provider = "openai"

[[model_routes]]
pattern = "o1-*"
provider = "openai"

[[model_routes]]
pattern = "o3-*"
provider = "openai"

[[model_routes]]
pattern = "deepseek-*"
provider = "deepseek"

[[model_routes]]
pattern = "gemini-*"
provider = "gemini"

# Failover example: try openai first, then deepseek as backup
# [[model_routes]]
# pattern = "gpt-*"
# providers = ["openai", "deepseek"]
# strategy = "priority"
#
# Load-balance start provider while retaining failover order
# [[model_routes]]
# pattern = "gpt-*"
# providers = ["openai", "deepseek"]
# strategy = "round_robin"

# Wildcard fallback: any unmatched model goes to openai
[[model_routes]]
pattern = "*"
provider = "openai"
upstream_model = "gpt-4.1-mini"

# ── Legacy Routes (backward compatible) ─────────────────────────────
# Format-based routing. Used as fallback when no model_routes are configured.
# If model_routes is set, these are only used when no model pattern matches.

# [[routes]]
# client_format = "claude"
# provider = "openai"

# ── Logging ──────────────────────────────────────────────────────────

[logging]
level = "info"
dir = "./logs"          # Also enables usage logging (usage.YYYY-MM-DD.jsonl)
max_disk_mb = 500

# Optional full request/response audit logging.
# When enabled, each request is written as one JSON Lines record to
# requests.YYYY-MM-DD.jsonl in the logging directory.
[logging.request_log]
enabled = true
max_capture_bytes = 10485760  # 10 MiB per captured body

[logging.console]
enabled = true
output = "stdout"
format = "pretty"

# [[logging.files]]
# name = "general"
# level = "info"
# format = "json"
# rotation = "daily"
